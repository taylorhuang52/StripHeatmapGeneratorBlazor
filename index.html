<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strip Heatmap Generator</title>
    <base href="/StripHeatmapGeneratorBlazor/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="StripHeatmapGeneratorBlazor.styles.css" />

    <script>
        // SPA redirect receiver - fix double-slash by trimming trailing slash from pathname
        (function () {
            var params = new URLSearchParams(window.location.search);
            var path = params.get('p');
            if (path) {
                var base = window.location.pathname.replace(/\/$/, ''); // remove trailing slash
                var newUrl = base + path +
                    (params.get('q') ? '?' + params.get('q') : '') +
                    window.location.hash;
                window.history.replaceState(null, null, newUrl);
            }
        })();
    </script>
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;
                    height:100vh;font-family:sans-serif;color:#888;font-size:18px">
            載入中…
        </div>
    </div>

    <script>
    window.stripHeatmap = {
        render: function (spec, canvasId, imgId) {
            var canvas = document.getElementById(canvasId);
            canvas.width  = spec.width;
            canvas.height = spec.height;
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, spec.width, spec.height);
            for (var i = 0; i < spec.rects.length; i++) {
                var r = spec.rects[i];
                ctx.fillStyle = r.fill;
                ctx.fillRect(r.x, r.y, r.w, r.h);
            }
            for (var j = 0; j < spec.texts.length; j++) {
                var t = spec.texts[j];
                ctx.font      = (t.bold ? 'bold ' : '') + t.size + 'px Arial,sans-serif';
                ctx.fillStyle = t.fill;
                ctx.textAlign = t.center ? 'center' : 'left';
                ctx.fillText(t.text, t.x, t.y);
            }
            var img = document.getElementById(imgId);
            if (img) img.src = canvas.toDataURL('image/png');
        },
        exportPng: function (canvasId, filename) {
            var canvas = document.getElementById(canvasId);
            var a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = filename;
            a.click();
        },
        downloadBase64Csv: function (filename, base64) {
            var a = document.createElement('a');
            a.href = 'data:text/csv;base64,' + base64;
            a.download = filename;
            a.click();
        }
    };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
